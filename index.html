<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#111111" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="VerkaufTool" />
<title>VerkaufTool</title>
  <style>
    :root { --b:#e8e8e8; --r:14px; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin:0; background:#fafafa; color:#111; }
    header { position: sticky; top:0; background:#fff; border-bottom:1px solid var(--b); padding:14px 14px 10px; z-index:10; }
    h1 { font-size:18px; margin:0 0 8px; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 14px; }
    .card { background:#fff; border:1px solid var(--b); border-radius: var(--r); padding:12px; margin-bottom:12px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    label { font-size:12px; opacity:.75; display:block; margin-bottom:4px; }
    input, textarea, select { font-size:16px; padding:10px; border:1px solid var(--b); border-radius:12px; width:100%; box-sizing:border-box; }
    textarea { min-height: 44px; resize: vertical; }
    .col { flex: 1 1 220px; }
    button { font-size:16px; padding:10px 12px; border-radius:12px; border:1px solid var(--b); background:#fff; cursor:pointer; }
    button.primary { background:#111; color:#fff; border-color:#111; }
    button.danger { border-color:#b00020; color:#b00020; }
    .muted { opacity:.7; font-size:12px; }
    .ok { color:#0a7a0a; }
    .err { color:#b00020; }
    .pill { font-size:12px; padding:4px 8px; border:1px solid var(--b); border-radius:999px; background:#fff; }
    table { width:100%; border-collapse: collapse; }
    th, td { border-bottom:1px solid #f0f0f0; padding:10px 8px; text-align:left; vertical-align: top; }
    th { font-size:12px; opacity:.7; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .right { text-align:right; }
    .nowrap { white-space:nowrap; }
    .small { font-size:12px; }
    .top-actions { display:flex; gap:8px; flex-wrap:wrap; }
  </style>
</head>
<body>
<header>
  <div class="wrap" style="padding:0 14px;">
    <h1>VerkaufTool (Offline)</h1>
      <div class="muted" id="welcomeLine" style="margin-top:4px;"></div>
    <div class="row">
      <span class="pill" id="countPill">0 Verkäufe</span>
      <span class="pill" id="lastBackupPill">Backup: —</span>
      <span class="pill" id="queuePill">Status: Offline OK</span>
    </div>
    <div class="muted" id="hintLine" style="margin-top:6px;">
      Tipp: Bluetooth-Scanner = Tastatur. Barcode-Feld aktiv lassen und scannen → Enter.
    </div>
  </div>
</header>

<div class="wrap">

  <div class="card">
    <div class="row">
      <div class="col" style="flex:2 1 300px;">
        <label>Barcode</label>
        <input id="barcode" class="mono" inputmode="numeric" autocomplete="off" placeholder="Scannen oder eingeben" />
      </div>
      <div class="col" style="max-width: 180px;">
        <label>Preis (€)</label>
        <input id="price" inputmode="decimal" placeholder="z.B. 49,99" />
      </div>
    </div>
    <div class="row" style="margin-top:10px;">
      <div class="col">
        <label>Notiz (optional)</label>
        <textarea id="note" placeholder="z.B. Bar / kleiner Fleck / Kunde XY"></textarea>
      </div>
    </div>

    <div class="row" style="margin-top:10px;">
      <div class="top-actions">
        <button class="primary" id="btnAdd">Verkauft speichern</button>
        <button id="btnReturn">Rückgabe (Barcode löschen)</button>
        <button id="btnExport">Export CSV</button>
        <button class="danger" id="btnClear">Alles löschen (Test)</button>
      </div>
      <div class="muted" id="statusMsg" style="flex:1 1 240px;"></div>
    </div>

    <div class="muted" style="margin-top:10px;">
      Backup-Empfehlung: alle 3 Tage oder alle 100 Verkäufe → „Export CSV“.
    </div>
  </div>

  <div class="card">
    <div class="row">
      <div class="col">
        <label>Suche (Barcode / Notiz)</label>
        <input id="search" placeholder="suchen..." />
      </div>
      <div class="col" style="max-width:220px;">
        <label>Ansicht</label>
        <select id="viewMode">
          <option value="latest">Neueste zuerst</option>
          <option value="oldest">Älteste zuerst</option>
        </select>
      </div>
      <div class="col" style="max-width:220px;">
        <label>Limit</label>
        <select id="limit">
          <option value="50">50</option>
          <option value="100" selected>100</option>
          <option value="200">200</option>
          <option value="9999">Alle</option>
        </select>
      </div>
    </div>

    <div style="overflow:auto; margin-top:10px;">
      <table>
        <thead>
          <tr>
            <th>Zeit</th>
            <th>Barcode</th>
            <th class="right">Preis</th>
            <th>Notiz</th>
            <th class="right">Aktion</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
/** -----------------------------
 *  IndexedDB helper (без библиотек)
 *  ----------------------------- */
const DB_NAME = "verkauf_tool_db";
const DB_VER  = 1;
const STORE   = "sales";
// --- Shop Name (einmalig) ---
const SHOP_KEY = "shopName";

function getOrAskShopName() {
  let name = (localStorage.getItem(SHOP_KEY) || "").trim();

  if (!name) {
    name = (prompt("Shop Name eingeben (einmalig):") || "").trim();

    // если человек нажал Cancel/пусто — зададим нейтрально
    if (!name) name = "Shop";

    localStorage.setItem(SHOP_KEY, name);
  }
  return name;
}

function setWelcome(name) {
  const el = document.getElementById("welcomeLine");
  if (el) el.textContent = `Herzlich willkommen, ${name}`;
}


function openDb() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE)) {
        const st = db.createObjectStore(STORE, { keyPath: "id" });
        st.createIndex("ts", "ts", { unique: false });
        st.createIndex("barcode", "barcode", { unique: false });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbTx(mode, fn) {
  const db = await openDb();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, mode);
    const st = tx.objectStore(STORE);
    const res = fn(st);
    tx.oncomplete = () => resolve(res);
    tx.onerror = () => reject(tx.error);
  });
}

function nowIso() {
  const d = new Date();
  // локальное время в ISO-подобном виде
  const pad = (n)=>String(n).padStart(2,"0");
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

function uid() {
  // достаточно уникально для офлайна
  return `${Date.now()}_${Math.random().toString(16).slice(2)}`;
}

/** -----------------------------
 *  UI
 *  ----------------------------- */
const $ = (id)=>document.getElementById(id);

const state = {
  items: [],
  count: 0,
  lastBackupAt: localStorage.getItem("lastBackupAt") || "",
  lastBackupCount: Number(localStorage.getItem("lastBackupCount") || "0"),
};

function setStatus(msg, kind="muted") {
  const el = $("statusMsg");
  el.className = kind === "ok" ? "ok" : kind === "err" ? "err" : "muted";
  el.textContent = msg;
}

function parsePrice(str) {
  // поддержка "49,99" и "49.99"
  const s = (str || "").trim().replace(",", ".");
  if (!s) return NaN;
  const n = Number(s);
  return Number.isFinite(n) ? n : NaN;
}

function fmtPrice(n) {
  if (!Number.isFinite(n)) return "";
  return n.toFixed(2);
}

function updatePills() {
  $("countPill").textContent = `${state.count} Verkäufe`;

  const lb = state.lastBackupAt ? state.lastBackupAt : "—";
  $("lastBackupPill").textContent = `Backup: ${lb}`;

  // просто информируем о сети
  $("queuePill").textContent = navigator.onLine ? "Status: Online" : "Status: Offline OK";
}

function escapeHtml(s) {
  return String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function render() {
  const q = $("search").value.trim().toLowerCase();
  const mode = $("viewMode").value;
  const limit = Number($("limit").value);

  let list = state.items.slice();

  if (q) {
    list = list.filter(x => {
      const hay = `${x.barcode} ${x.note ?? ""}`.toLowerCase();
      return hay.includes(q);
    });
  }

  list.sort((a,b)=> mode === "latest" ? (b.ts - a.ts) : (a.ts - b.ts));
  if (limit !== 9999) list = list.slice(0, limit);

  const tb = $("tbody");
  tb.innerHTML = "";

  for (const it of list) {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="nowrap small">${escapeHtml(it.time)}</td>
      <td class="mono">${escapeHtml(it.barcode)}</td>
      <td class="right nowrap">${escapeHtml(fmtPrice(it.price))} €</td>
      <td class="small">${escapeHtml(it.note || "")}</td>
      <td class="right">
        <button class="danger small" data-del="${it.id}">Löschen</button>
      </td>
    `;
    tb.appendChild(tr);
  }

  tb.querySelectorAll("button[data-del]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const id = btn.getAttribute("data-del");
      await deleteById(id);
    });
  });
}

async function loadAll() {
  const items = await dbTx("readonly", (st) => {
    return new Promise((resolve, reject) => {
      const req = st.getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    });
  });

  state.items = items;
  state.count = items.length;
  updatePills();
  render();

  maybeRemindBackup();
}

async function addSale() {
  const barcode = $("barcode").value.trim();
  const price = parsePrice($("price").value);
  const note = $("note").value.trim();

  if (!barcode) {
    setStatus("Barcode ist leer.", "err");
    $("barcode").focus();
    return;
  }
  if (!Number.isFinite(price) || price <= 0) {
    setStatus("Preis ist ungültig.", "err");
    $("price").focus();
    $("price").select();
    return;
  }

    // умная защита от двойной продажи
  const last = findLastSaleByBarcode(barcode);
  if (last) {
    const msg =
      `Achtung: Dieser Barcode wurde bereits verkauft.\n\n` +
      `Letzter Eintrag:\n` +
      `Zeit: ${last.time}\n` +
      `Preis: ${fmtPrice(last.price)} €\n` +
      `Notiz: ${(last.note || "—")}\n\n` +
      `OK = trotzdem speichern\n` +
      `Abbrechen = Optionen`;

    const forceSave = confirm(msg);

    if (!forceSave) {
      const doReturn = confirm(
        `Möchtest du stattdessen eine Rückgabe machen?\n\n` +
        `OK = Rückgabe (letzten Eintrag löschen)\n` +
        `Abbrechen = nichts tun`
      );

      if (doReturn) {
        await deleteById(last.id);
        setStatus(`Rückgabe durchgeführt: ${barcode}`, "ok");
      } else {
        setStatus("Abgebrochen: Doppelverkauf verhindert.", "err");
      }

      $("barcode").focus();
      $("barcode").select();
      return;
    }
  }

  const item = {
    id: uid(),
    barcode,
    price,
    note,
    ts: Date.now(),
    time: nowIso(),
  };

  await dbTx("readwrite", (st) => st.put(item));
  state.items.push(item);
  state.count++;

  setStatus(`Gespeichert: ${barcode}`, "ok");

  // UX: очистка и фокус на barcode
  $("barcode").value = "";
  $("price").value = "";
  $("note").value = "";
  $("barcode").focus();

  updatePills();
  render();
  maybeRemindBackup();
}

async function deleteById(id) {
  await dbTx("readwrite", (st) => st.delete(id));
  state.items = state.items.filter(x => x.id !== id);
  state.count = state.items.length;
  setStatus("Eintrag gelöscht.", "ok");
  updatePills();
  render();
}

async function returnByBarcode() {
  const barcode = $("barcode").value.trim();
  if (!barcode) {
    setStatus("Für Rückgabe: Barcode eingeben/scannen.", "err");
    $("barcode").focus();
    return;
  }

  // удаляем самый свежий продажный чек по этому баркоду
  const candidates = state.items.filter(x => x.barcode === barcode);
  if (candidates.length === 0) {
    setStatus("Kein Verkauf mit diesem Barcode gefunden.", "err");
    $("barcode").focus();
    $("barcode").select();
    return;
  }

  candidates.sort((a,b)=> b.ts - a.ts);
  const target = candidates[0];
  await deleteById(target.id);

  setStatus(`Rückgabe: ${barcode} entfernt.`, "ok");
  $("barcode").value = "";
  $("barcode").focus();
}

function toCsv(items) {
  const header = ["shopName","time","barcode","price","note"];
  const rows = items
    .slice()
    .sort((a,b)=> a.ts - b.ts)
    .map(x => [
  (localStorage.getItem(SHOP_KEY) || "").trim(),
  x.time,
  x.barcode,
  fmtPrice(x.price),
  (x.note ?? "").replaceAll("\n"," ").trim()
]);


  const escapeCsv = (v) => {
    const s = String(v ?? "");
    if (s.includes('"') || s.includes(",") || s.includes("\n")) {
      return `"${s.replaceAll('"','""')}"`;
    }
    return s;
  };

  const lines = [header.map(escapeCsv).join(",")];
  for (const r of rows) lines.push(r.map(escapeCsv).join(","));
  return lines.join("\n");
}

function downloadFile(name, mime, content) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  a.remove();

  setTimeout(()=>URL.revokeObjectURL(url), 1500);
}

function exportCsv(isBackup=false) {
  const items = state.items;
  const csv = toCsv(items);
  const stamp = new Date();
  const pad=(n)=>String(n).padStart(2,"0");
  const file = `verkaeufe_${stamp.getFullYear()}-${pad(stamp.getMonth()+1)}-${pad(stamp.getDate())}_${pad(stamp.getHours())}${pad(stamp.getMinutes())}.csv`;

  downloadFile(file, "text/csv;charset=utf-8", csv);

  // отметим последний бэкап
  state.lastBackupAt = nowIso();
  localStorage.setItem("lastBackupAt", state.lastBackupAt);
  localStorage.setItem("lastBackupCount", String(state.count));
  state.lastBackupCount = state.count;

  updatePills();
  setStatus(isBackup ? "Backup CSV erstellt." : "CSV exportiert.", "ok");
}

function maybeRemindBackup() {
  // напоминание: каждые 100 продаж или каждые 3 дня
  const COUNT_STEP = 100;
  const DAYS_STEP  = 3;

  const lastCount = state.lastBackupCount || 0;
  const needByCount = (state.count - lastCount) >= COUNT_STEP;

  let needByDays = false;
  const last = state.lastBackupAt;
  if (last) {
    // last is "YYYY-MM-DD HH:mm:ss"
    const d = new Date(last.replace(" ", "T"));
    if (!Number.isNaN(d.getTime())) {
      const diffDays = (Date.now() - d.getTime()) / (1000*60*60*24);
      needByDays = diffDays >= DAYS_STEP;
    }
  } else {
    // если ни разу не делали backup — мягко напоминаем после 20 продаж
    needByDays = state.count >= 20;
  }

  if (needByCount || needByDays) {
    $("hintLine").innerHTML =
      `⚠️ Empfehlung: Bitte <b>Export CSV</b> machen (Backup). ` +
      `Verkäufe seit letztem Backup: <b>${state.count - lastCount}</b>.`;
  } else {
    $("hintLine").textContent =
      "Tipp: Bluetooth-Scanner = Tastatur. Barcode-Feld aktiv lassen und scannen → Enter.";
  }
}

async function clearAll() {
  if (!confirm("Wirklich ALLES löschen? (nur Test)")) return;
  await dbTx("readwrite", (st) => st.clear());
  state.items = [];
  state.count = 0;
  setStatus("Alles gelöscht.", "ok");
  updatePills();
  render();
}

// events
$("btnAdd").addEventListener("click", addSale);
$("btnReturn").addEventListener("click", returnByBarcode);
$("btnExport").addEventListener("click", () => exportCsv(false));
$("btnClear").addEventListener("click", clearAll);

$("search").addEventListener("input", render);
$("viewMode").addEventListener("change", render);
$("limit").addEventListener("change", render);

// Enter flow:
// - если фокус в barcode и есть price -> сохранить
// - если фокус в price -> сохранить
$("barcode").addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    // после скана часто приходит Enter
    $("price").focus();
    $("price").select();
  }
});
$("price").addEventListener("keydown", (e) => {
  if (e.key === "Enter") addSale();
});

window.addEventListener("online", updatePills);
window.addEventListener("offline", updatePills);

// init
loadAll().then(() => {
  const shopName = getOrAskShopName();
  setWelcome(shopName);

  $("barcode").focus();
  updatePills();
  setStatus("Bereit.", "muted");
});


function findLastSaleByBarcode(barcode) {
  const matches = state.items.filter(x => x.barcode === barcode);
  if (matches.length === 0) return null;
  matches.sort((a,b) => b.ts - a.ts);
  return matches[0];
}

</script>

<script>
  // PWA service worker
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./service-worker.js").catch(() => {});
    });
  }
</script>

</body>
</html>
